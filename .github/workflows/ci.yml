name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install node deps
        run: npm install
      - name: Run TS tests
        run: npm test
      - name: Install playwright browsers
        run: npx playwright install --with-deps
      - name: Run web e2e
        run: npm run test:web:e2e
      - name: Install python deps
        run: pip install -r desktop-ui-python/requirements.txt
      - name: Run desktop tests
        run: pytest desktop-ui-python/tests -q
      - name: Generate PDF report
        run: python services/report-service/generate_report.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-training-artifacts
          path: |
            artifacts/
            apps/web-ui/playwright-report/
